app-id: org.zim_wiki.Zim
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
add-extensions:
  org.freedesktop.Sdk.Extension.texlive:
    directory: texlive
    version: '25.08'
    no-autodownload: true
    autodelete: false
command: zim
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  # libappindicator access
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home
  - --filesystem=/run/media
  - --filesystem=/media
  - --env=PATH=/app/bin:/usr/bin:/app/texlive-bin:/app/texlive/bin
  - --env=TMPDIR=/var/tmp
cleanup:
  - /share/gtk-doc
  - /share/gnome/help
modules:
  - name: graphviz
    buildsystem: autotools
    config-opts:
      - --disable-tcl
    cleanup:
      - /share/graphviz/doc
    sources:
      - type: archive
        url: >-
          https://gitlab.com/graphviz/graphviz/-/archive/15.1.0/graphviz-15.1.0.tar.bz2
        sha256: 3d5a89a28f8bf746604031d7723263742d786442f77d344140f7f9b18cecba3c
        x-checker-data:
          type: anitya
          project-id: 1249
          stable-only: true
          url-template: >-
            https://gitlab.com/graphviz/graphviz/-/archive/$version/graphviz-$version.tar.bz2
  - name: pygtkspellcheck
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST}
        --no-build-isolation pyenchant pygtkspellcheck
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b1/a3/86763b6350727ca81c8fcc5bb5bccee416e902e0085dc7a902c81233717e/pyenchant-3.2.2.tar.gz
        sha256: 1cf830c6614362a78aab78d50eaf7c6c93831369c52e1bb64ffae1df0341e637
      - type: file
        url: https://files.pythonhosted.org/packages/85/d4/610e9b4be60bac8f5a155a9553a982c3462a6b3eb117e9903f59e9389fac/pygtkspellcheck-5.0.3-py3-none-any.whl
        sha256: 5bd6fb3bdfcb3ce13825535ba6f1dc5d2e07a3e5d87d3034d8478d8bc884902c
  - name: python-pyxdg
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app
    sources:
      - type: archive
        url: >-
          https://files.pythonhosted.org/packages/b0/25/7998cd2dec731acbd438fbf91bc619603fc5188de0a9a17699a781840452/pyxdg-0.28.tar.gz
        sha256: 3267bb3074e934df202af2ee0868575484108581e6f3cb006af1da35395e88b4
  - shared-modules/libappindicator/libappindicator-gtk3-introspection-12.10.json
  - name: xdot
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: archive
        url: >-
          https://files.pythonhosted.org/packages/32/68/13f80d47bffda03eaf05bd076d1b2ef9a1cf39b461b37e32f303bcf048de/xdot-1.6.tar.gz
        sha256: ebddefc3e3aa9fd8b2e2ed884ed844043f843428b79dccda831803add55cc51d
    modules:
      - name: numpy
        buildsystem: simple
        build-commands:
          - ./vendored-meson/meson/meson.py setup builddir --buildtype=debugoptimized
            --prefix=${FLATPAK_DEST}
          - cd builddir && ninja
          - cd builddir && ninja install
        sources:
          - type: archive
            url: https://files.pythonhosted.org/packages/e7/05/3d27272d30698dc0ecb7fdfaa41ad70303b444f81722bb99bce1d818638a/numpy-2.5.0.tar.gz
            sha256: 5a129578019311b6e56bdd714250f19b518f7dceeeb8d1af5490f4942d3f891c
        cleanup:
          - /bin
          - /lib/python3.*/site-packages/numpy/core/include
          - /lib/python3.*/site-packages/numpy/core/lib/libnpymath.a
          - /lib/python3.*/site-packages/numpy/tests
          - /lib/python3.*/site-packages/numpy/*/tests
  - name: gtksourceview
    buildsystem: meson
    sources:
      - type: archive
        # latest version that supports GTK3
        url: https://download.gnome.org/sources/gtksourceview/4.8/gtksourceview-4.8.4.tar.xz
        sha256: 7ec9d18fb283d1f84a3a3eff3b7a72b09a10c9c006597b3fbabbb5958420a87d
  - name: zim
    buildsystem: simple
    build-commands:
      - python3 setup.py build
      - python3 setup.py install --prefix=/app --skip-build
      - find /app/share/icons/ -name 'application-x-zim-notebook.*' -exec rename application
        org.zim_wiki.Zim-application '{}' \;
      - mkdir /app/texlive
      - ln -s texlive/bin/${FLATPAK_ARCH}-linux /app/texlive-bin
    sources:
      - type: archive
        url: https://zim-wiki.org/downloads/zim-0.77.1.tar.gz
        sha256: 53a8d3b30763310d1fb561e1f308d8d78ae332fc8a67bec22d6d2c68d6351120
        x-checker-data:
          type: anitya
          project-id: 5301
          stable-only: true
          url-template: https://zim-wiki.org/downloads/zim-$version.tar.gz
      - type: patch
        path: mimetype-icon.patch
      - type: patch
        path: appdata-fixes.patch
